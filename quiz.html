<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Basics Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="main-container">
        <div class="app-box">
            <h2>Computer Basics Quiz</h2>
            <div id="score-display">Score: 0 / 10</div>
            <div class="quiz-container">
                <div class="quiz-header">
                    <span id="timer-display" class="timer">Time left: 15s</span>
                </div>
                <div id="question-text" class="question"></div>
                <div id="options-container" class="options"></div>
                <div id="quiz-message" class="message"></div>
                <button id="btn-next" class="btn-action">Next Question</button>
                <button id="btn-try-again" class="btn-action">Try Again</button>
            </div>
        </div>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
